name: Docker CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  docker-test:
    runs-on: ubuntu-latest

    env:
      APP_USERNAME: ${{ secrets.APP_USERNAME }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      APP_ENV: "ci"
      HEADLESS: "true"
      DEPOSIT_AMOUNT: "1000"
      WITHDRAWAL_AMOUNT: "100"
      SPINS: "10"
      SPIN_DELAY: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t qa-ci-project .

      - name: Run tests in Docker container
        run: |
          docker run --rm \
            -e APP_USERNAME="$APP_USERNAME" \
            -e APP_PASSWORD="$APP_PASSWORD" \
            -e APP_ENV="$APP_ENV" \
            -e HEADLESS="$HEADLESS" \
            -e DEPOSIT_AMOUNT="$DEPOSIT_AMOUNT" \
            -e WITHDRAWAL_AMOUNT="$WITHDRAWAL_AMOUNT" \
            -e SPINS="$SPINS" \
            -e SPIN_DELAY="$SPIN_DELAY" \
            qa-ci-project
